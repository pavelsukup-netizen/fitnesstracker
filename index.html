<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Trénink log v7</title>
  <style>
    :root{
      --bg:#0e1117;
      --panel:#171b24;
      --panel2:#202636;
      --panel3:#10151f;
      --line:#30384a;
      --text:#eef3fb;
      --muted:#a8b3c6;
      --accent:#5aa2ff;
      --good:#65d983;
      --warn:#ffcf5a;
      --danger:#ff6b6b;
      --violet:#b98cff;
      --radius:18px;
      --shadow:0 18px 42px rgba(0,0,0,.32);
    }
    *{box-sizing:border-box}
    html,body{min-height:100%;}
    body{
      margin:0;
      font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top left,rgba(90,162,255,.16),transparent 32%),linear-gradient(180deg,#0c1017,#141a26 45%,#0e1117);
      color:var(--text);
      overflow-x:hidden;
    }
    button,input,select{font:inherit;border:none;outline:none}
    button{background:var(--panel2);color:var(--text);border:1px solid var(--line);border-radius:13px;padding:10px 13px;cursor:pointer;transition:.16s transform,.16s background,.16s border-color}
    button:hover{transform:translateY(-1px);background:#293247;border-color:#465673}
    button:disabled{opacity:.45;cursor:not-allowed;transform:none}
    button.primary{background:var(--accent);border-color:transparent;color:#08101e;font-weight:850}
    button.good{background:rgba(101,217,131,.13);border-color:rgba(101,217,131,.33);color:#d9ffe2}
    button.warn{background:rgba(255,207,90,.12);border-color:rgba(255,207,90,.28);color:#fff0b3}
    button.danger{background:rgba(255,107,107,.12);border-color:rgba(255,107,107,.28);color:#ffdada}
    button.ghost{background:#10151f}
    input,select{background:#0f141e;color:var(--text);border:1px solid var(--line);border-radius:13px;padding:11px 12px;min-width:0;width:100%}
    label{font-size:12px;color:var(--muted);display:block;margin:0 0 7px 0}
    .wrap{max-width:1120px;margin:0 auto;padding:14px 14px 28px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
    h1{font-size:23px;line-height:1.05;margin:0;font-weight:900;letter-spacing:-.02em;background:linear-gradient(90deg,#fff,#b8c6dc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .sub{font-size:12px;color:var(--muted);margin-top:4px}
    .menu-btn{width:44px;height:44px;display:grid;place-items:center;border-radius:14px;flex:0 0 auto}
    .screen{display:none}
    .screen.active{display:block}
    .card{background:rgba(23,27,36,.93);backdrop-filter:blur(12px);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
    .card + .card{margin-top:12px}
    .card-head{padding:15px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
    .card-body{padding:15px 16px}
    h2{font-size:18px;margin:0;font-weight:900;letter-spacing:-.01em}
    h3{font-size:16px;margin:0;font-weight:850}
    .row{display:flex;gap:9px;align-items:center;flex-wrap:wrap}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:11px}
    .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:11px}
    .tiny{font-size:11px;color:var(--muted);line-height:1.35}
    .muted{color:var(--muted)}
    .hr{height:1px;background:var(--line);margin:14px 0}
    .pill,.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;border-radius:999px;background:#222a3a;border:1px solid var(--line);color:var(--muted);font-size:12px;white-space:nowrap}
    .pill.good{color:#d9ffe2;border-color:rgba(101,217,131,.3);background:rgba(101,217,131,.09)}
    .pill.warn{color:#fff0b3;border-color:rgba(255,207,90,.3);background:rgba(255,207,90,.09)}
    .pill.blue{color:#dceaff;border-color:rgba(90,162,255,.3);background:rgba(90,162,255,.10)}
    .day-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:6px;margin:0 0 12px}
    .day-btn{min-height:58px;padding:7px 4px;text-align:center;border-radius:12px;background:var(--panel)}
    .day-btn.active{border-color:#5f83b8;background:linear-gradient(180deg,#1f2b3d,#17202d)}
    .day-short{font-size:13px;font-weight:900;text-transform:uppercase}
    .day-count{font-size:10px;color:var(--muted);margin-top:3px}
    .metric-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px;margin:12px 0}
    .metric{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:15px;padding:11px 10px;min-width:0}
    .metric .t{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
    .metric .v{font-size:17px;font-weight:900;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .metric .s{font-size:10px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .plan-list,.log-list,.db-list{display:flex;flex-direction:column;gap:10px}
    .plan-item,.log-item,.db-item{border:1px solid var(--line);background:linear-gradient(180deg,#151b25,#10151d);border-radius:16px;padding:12px}
    .plan-top,.db-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
    .plan-title,.db-title{font-size:16px;font-weight:900}
    .plan-controls{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end}
    .icon-btn{min-width:36px;height:36px;padding:0;display:grid;place-items:center;border-radius:10px;font-weight:900}
    .picker{border:1px solid var(--line);background:rgba(0,0,0,.16);border-radius:16px;padding:12px;margin-top:12px}
    .picker-actions{display:grid;grid-template-columns:1fr auto;gap:8px;margin-top:10px}
    .sticky-start{position:sticky;bottom:0;padding:12px 0 0;background:linear-gradient(180deg,rgba(14,17,23,0),rgba(14,17,23,.96) 35%,rgba(14,17,23,1));z-index:5}
    .start-btn{width:100%;min-height:52px;font-size:16px;border-radius:16px}
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.68);backdrop-filter:blur(5px);z-index:100;opacity:0;visibility:hidden;transition:.2s}
    .drawer-overlay.open{opacity:1;visibility:visible}
    .drawer{position:fixed;top:0;right:-322px;width:322px;max-width:88vw;height:100%;background:var(--panel);border-left:1px solid var(--line);box-shadow:-16px 0 45px rgba(0,0,0,.48);z-index:101;transition:right .24s cubic-bezier(.16,1,.3,1);display:flex;flex-direction:column}
    .drawer.open{right:0}
    .drawer-head{padding:18px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between}
    .drawer-body{padding:16px;display:flex;flex-direction:column;gap:10px;flex:1}
    .drawer-body button{text-align:left;width:100%}
    .drawer-foot{padding:16px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);text-align:center}
    .toast-wrap{position:fixed;left:12px;right:12px;bottom:12px;display:flex;flex-direction:column;gap:8px;z-index:200;pointer-events:none}
    .toast{padding:12px 14px;border-radius:14px;background:#202738;border:1px solid var(--line);box-shadow:var(--shadow);font-size:13px;font-weight:700;animation:toastIn .22s ease forwards}
    .toast.good{border-color:rgba(101,217,131,.35);background:rgba(30,72,45,.96)}
    .toast.warn{border-color:rgba(255,207,90,.35);background:rgba(70,55,20,.96)}
    .toast.danger{border-color:rgba(255,107,107,.35);background:rgba(75,25,30,.96)}
    @keyframes toastIn{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}

    /* Session */
    .session-top{position:sticky;top:0;z-index:8;background:linear-gradient(180deg,rgba(14,17,23,1),rgba(14,17,23,.94));padding-bottom:10px;margin-bottom:10px}
    .session-bar{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center}
    .timer{font-variant-numeric:tabular-nums;font-size:28px;font-weight:950;letter-spacing:-.03em}
    .exercise-hero{border:1px solid var(--line);border-radius:20px;background:linear-gradient(180deg,#182033,#101720);padding:15px;box-shadow:var(--shadow)}
    .exercise-index{font-size:12px;color:var(--muted);margin-bottom:4px}
    .exercise-name{font-size:23px;font-weight:950;line-height:1.05;letter-spacing:-.03em}
    .pr-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:13px}
    .pr-card{background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:13px;padding:9px 8px;min-width:0}
    .pr-card .t{font-size:10px;color:var(--muted);text-transform:uppercase}
    .pr-card .v{font-size:13px;font-weight:900;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .set-list{display:flex;flex-direction:column;gap:10px;margin-top:12px}
    .set-card{border:1px solid var(--line);border-radius:17px;background:linear-gradient(180deg,#151b25,#10151f);padding:11px}
    .set-title{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
    .set-title strong{font-size:14px}
    .set-inputs{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .set-inputs.bw{grid-template-columns:repeat(2,minmax(0,1fr))}
    .num-control{display:grid;grid-template-columns:32px 1fr 32px;gap:4px;align-items:center}
    .num-control input{text-align:center;padding:8px 4px;height:38px;font-size:14px}
    .num-control button{height:38px;min-width:32px;padding:0;font-weight:900;border-radius:10px}
    .input-label{font-size:10px;color:var(--muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
    .bw-box{height:38px;border:1px solid var(--line);border-radius:12px;background:#0f141e;display:grid;place-items:center;font-weight:900;color:#dceaff}
    .trend-stack{margin-top:10px;display:grid;gap:6px}
    .trend-line{display:grid;grid-template-columns:52px 1fr 54px;gap:8px;align-items:center;font-size:11px;color:var(--muted)}
    .trend-line .name{font-weight:800;color:#dce3ef}
    .bar-track{height:7px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;position:relative}
    .bar-track:after{content:'';position:absolute;left:75%;top:0;width:2px;height:100%;background:rgba(255,255,255,.36)}
    .bar{height:100%;border-radius:999px;width:75%;background:var(--warn);transition:.18s}
    .delta{text-align:right;font-variant-numeric:tabular-nums;font-weight:900}
    .delta.up{color:#baffc8}.delta.down{color:#ffd1d1}.delta.same{color:#ffe9a2}.delta.mix{color:#cfe2ff}
    .session-nav{position:sticky;bottom:0;z-index:8;padding:12px 0 0;background:linear-gradient(180deg,rgba(14,17,23,0),rgba(14,17,23,.96) 35%,#0e1117)}
    .session-nav-inner{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .session-nav-inner.single{grid-template-columns:1fr}
    .big-nav{min-height:54px;font-size:16px;border-radius:16px;font-weight:900}
    .progress-dots{display:flex;gap:5px;justify-content:center;margin:10px 0 0}
    .dot{width:8px;height:8px;border-radius:999px;background:#384254}.dot.active{background:var(--accent)}.dot.done{background:var(--good)}

    /* Log */
    .log-headline{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap}
    .log-title{font-size:16px;font-weight:900}
    .log-meta{font-size:12px;color:var(--muted);margin-top:2px}
    .log-metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:7px;margin:10px 0}
    .log-metric{background:rgba(0,0,0,.16);border:1px solid var(--line);border-radius:12px;padding:8px}
    .log-metric .t{font-size:9px;color:var(--muted);text-transform:uppercase}.log-metric .v{font-size:13px;font-weight:900;margin-top:2px}
    details{border-top:1px solid var(--line);padding-top:10px;margin-top:10px}
    summary{cursor:pointer;color:#dbe7f7;font-weight:800;font-size:13px}
    .table-wrap{overflow:auto;margin-top:10px}
    table{width:100%;border-collapse:collapse;font-size:12px;min-width:650px}
    th,td{border-bottom:1px solid var(--line);padding:8px;text-align:left;white-space:nowrap}th{color:var(--muted);font-size:10px;text-transform:uppercase}

    @media(max-width:720px){
      .wrap{padding:10px 10px 24px}
      h1{font-size:20px}.sub{font-size:11px}
      .grid,.grid3{grid-template-columns:1fr}
      .metric-row{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
      .metric{padding:9px 6px;text-align:center}.metric .t{font-size:9px}.metric .v{font-size:14px}.metric .s{font-size:9px}
      .card-head,.card-body{padding:12px}
      .day-grid{gap:4px}.day-btn{min-height:50px;border-radius:10px;padding:5px 2px}.day-short{font-size:12px}.day-count{font-size:9px}
      .picker-actions{grid-template-columns:1fr}.plan-top{flex-direction:column}.plan-controls{width:100%;justify-content:space-between}.plan-controls button{flex:1}
      .timer{font-size:24px}.exercise-name{font-size:21px}.exercise-hero{padding:13px}
      .pr-grid{grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}.pr-card{padding:8px 6px}.pr-card .v{font-size:12px}
      .set-inputs{grid-template-columns:1fr 1fr}.set-inputs.bw{grid-template-columns:1fr}
      .set-inputs .rpe-field{grid-column:1/-1}
      .log-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}
      .drawer{width:300px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Trénink log</h1>
        <div class="sub">v7 · preset → start → jeden cvik na obrazovce → log + CSV export</div>
      </div>
      <button class="menu-btn" id="menuBtn" title="Menu">☰</button>
    </div>

    <main id="app"></main>
  </div>

  <div class="drawer-overlay" id="drawerOverlay"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head"><h3>Menu</h3><button id="closeDrawer" class="icon-btn ghost">×</button></div>
    <div class="drawer-body">
      <button data-nav="setup">🏋️ Sestavit trénink</button>
      <button data-nav="logs">📜 Log tréninků</button>
      <button data-nav="db">🧱 Databáze cviků</button>
      <button id="exportJsonBtn">⬇️ Export JSON záloha</button>
      <button id="importJsonBtn">⬆️ Import JSON záloha</button>
      <input id="importFile" type="file" accept="application/json" style="display:none" />
      <button id="seedDbBtn" class="warn">✨ Nahrát základní home gym DB</button>
      <button id="resetBtn" class="danger">🗑️ Reset celé aplikace</button>
    </div>
    <div class="drawer-foot">Data jsou uložená lokálně v prohlížeči.<br>Občas exportuj JSON, ať nám je nesežere gremlin.</div>
  </aside>
  <div class="toast-wrap" id="toastWrap"></div>

<script>
const STORAGE_KEY = 'trainingLogApp_v7_sessionFlow';
const LEGACY_KEYS = ['trainingLogApp_v6_active','trainingLogApp_v6','trainingLogApp_v5','trainingLogApp_v4','trainingLogApp_v3'];
const DAYS = [
  {key:'mon',label:'Pondělí',short:'po'},
  {key:'tue',label:'Úterý',short:'út'},
  {key:'wed',label:'Středa',short:'st'},
  {key:'thu',label:'Čtvrtek',short:'čt'},
  {key:'fri',label:'Pátek',short:'pá'},
  {key:'sat',label:'Sobota',short:'so'},
  {key:'sun',label:'Neděle',short:'ne'},
];
const DAY_NAMES = Object.fromEntries(DAYS.map(d=>[d.key,d.label]));
const DAY_SHORT = Object.fromEntries(DAYS.map(d=>[d.key,d.short]));

let state = loadState();
let view = state.activeSession ? 'session' : 'setup';
let selectedDay = state.ui?.selectedDay || dayKeyToday();
let timerInterval = null;

function uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4)}
function dayKeyToday(){return ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()] || 'mon'}
function defaultState(){
  return {
    schemaVersion:7,
    bodyWeight:'',
    exercises:[],
    presets:Object.fromEntries(DAYS.map(d=>[d.key,{items:[]} ])),
    logs:[],
    activeSession:null,
    ui:{selectedDay:dayKeyToday(),partFilter:'all',exerciseSearch:'',dbPartFilter:'all',dbSearch:''}
  };
}
function migrateState(parsed){
  const base = defaultState();
  base.bodyWeight = parsed.bodyWeight ?? parsed.currentBodyWeight ?? parsed.settings?.bodyWeight ?? '';
  base.exercises = Array.isArray(parsed.exercises) ? parsed.exercises.map(ex=>({
    id: ex.id || uid(),
    name: ex.name || 'Bez názvu',
    part: (ex.part || ex.category || '').trim(),
    trackMode: ex.trackMode || 'both',
    valueMode: ex.valueMode || 'weight',
    history: Array.isArray(ex.history) ? ex.history.map(h=>({
      id: h.id || uid(),
      date: h.date || new Date().toISOString(),
      dayKey: h.dayKey || 'mon',
      setIndex: Math.max(1,Number(h.setIndex)||1),
      weight: h.weight === 'BW' ? null : (h.weight ?? null),
      reps: Number(h.reps)||0,
      rpe: h.rpe === undefined ? null : h.rpe,
      bodyWeight: h.bodyWeight ?? null,
      load: h.load ?? (ex.valueMode === 'bw' ? (h.bodyWeight ?? null) : (h.weight ?? null)),
      volume: h.volume ?? (((Number(h.weight)||0) * (Number(h.reps)||0)) || 0),
      sessionId: h.sessionId || null
    })) : []
  })) : [];

  if (parsed.presets) {
    for (const d of DAYS) {
      const items = parsed.presets?.[d.key]?.items || [];
      base.presets[d.key].items = items.map(i=>({exerciseId:i.exerciseId,setCount:Math.max(1,Number(i.setCount)||1)}));
    }
  } else if (parsed.days) {
    for (const d of DAYS) {
      const items = parsed.days?.[d.key]?.items || [];
      base.presets[d.key].items = items.map(i=>({exerciseId:i.exerciseId,setCount:Math.max(1,Number(i.setCount)||1)}));
    }
  }

  if (Array.isArray(parsed.logs)) {
    base.logs = parsed.logs.map(normalizeLog);
  } else if (Array.isArray(parsed.workouts)) {
    base.logs = parsed.workouts.map(w=>normalizeLog({
      id:w.id,date:w.date,dayKey:w.dayKey,totalVolume:w.totalVolume,setsCount:w.setsCount,exerciseCount:w.exerciseCount,durationSec:0,exercises:[]
    }));
  }
  base.activeSession = parsed.activeSession || null;
  base.ui = {...base.ui,...(parsed.ui||{})};
  return base;
}
function normalizeLog(w){
  return {
    id:w.id||uid(),
    date:w.date||new Date().toISOString(),
    dayKey:w.dayKey||'mon',
    startedAt:w.startedAt||w.date||new Date().toISOString(),
    endedAt:w.endedAt||w.date||new Date().toISOString(),
    durationSec:Number(w.durationSec)||0,
    bodyWeight:w.bodyWeight ?? '',
    totalVolume:Number(w.totalVolume)||0,
    externalVolume:Number(w.externalVolume)||0,
    bwVolume:Number(w.bwVolume)||0,
    setsCount:Number(w.setsCount)||0,
    exerciseCount:Number(w.exerciseCount)||0,
    exercises:Array.isArray(w.exercises)?w.exercises:[]
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY) || LEGACY_KEYS.map(k=>localStorage.getItem(k)).find(Boolean);
    if(!raw) return defaultState();
    return migrateState(JSON.parse(raw));
  }catch(e){console.error(e); return defaultState()}
}
function saveState(){localStorage.setItem(STORAGE_KEY, JSON.stringify(state));}
function escapeHtml(str){return String(str??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#039;')}
function toast(msg,type='info'){
  const wrap=document.getElementById('toastWrap');
  const el=document.createElement('div');
  el.className='toast '+(type==='success'?'good':type==='warn'?'warn':type==='danger'?'danger':'');
  el.innerHTML=msg;
  wrap.appendChild(el);
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translateY(12px)';setTimeout(()=>el.remove(),180)},3400);
}
function findExercise(id){return state.exercises.find(e=>e.id===id)}
function uniqueParts(){return [...new Set(state.exercises.map(e=>(e.part||'').trim()).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'cs'))}
function formatKg(n){return `${Math.round(Number(n)||0).toLocaleString('cs-CZ')} kg`}
function formatDuration(sec){sec=Math.max(0,Number(sec)||0);const h=Math.floor(sec/3600),m=Math.floor((sec%3600)/60),s=sec%60;return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`}
function dateTime(iso){return new Date(iso).toLocaleString('cs-CZ',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function dateOnly(iso){return new Date(iso).toLocaleDateString('cs-CZ')}
function effectiveLoadForSet(ex,set,bodyWeight){return ex?.valueMode==='bw' ? (Number(set.bodyWeight ?? bodyWeight ?? state.bodyWeight)||0) : (Number(set.weight)||0)}
function setVolume(ex,set,bodyWeight){return effectiveLoadForSet(ex,set,bodyWeight) * (Number(set.reps)||0)}
function exerciseStats(ex){
  const hist = (ex.history||[]).filter(h=>Number(h.reps)>0 || Number(h.weight)>0 || Number(h.load)>0);
  if(!hist.length) return {bestWeight:null,bestReps:null,bestVolume:null,last:null};
  const bestWeight = ex.valueMode==='bw' ? null : hist.reduce((a,b)=>(Number(b.weight)||0)>(Number(a.weight)||0)?b:a,hist[0]);
  const bestReps = hist.reduce((a,b)=>(Number(b.reps)||0)>(Number(a.reps)||0)?b:a,hist[0]);
  const bestVolume = hist.reduce((a,b)=>(Number(b.volume)||setVolume(ex,b,b.bodyWeight))>(Number(a.volume)||setVolume(ex,a,a.bodyWeight))?b:a,hist[0]);
  const last = [...hist].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  return {bestWeight,bestReps,bestVolume,last};
}
function formatPerf(ex,h,type='full'){
  if(!h) return '—';
  if(type==='weight') return ex.valueMode==='bw' ? 'BW' : `${Number(h.weight)||0} kg`;
  if(type==='reps') return `${Number(h.reps)||0} reps`;
  if(type==='volume') return formatKg(Number(h.volume)||setVolume(ex,h,h.bodyWeight));
  return ex.valueMode==='bw' ? `BW × ${Number(h.reps)||0}` : `${Number(h.weight)||0} kg × ${Number(h.reps)||0}`;
}
function getPreviousSet(ex,setIndex){
  return [...(ex.history||[])].sort((a,b)=>new Date(b.date)-new Date(a.date)).find(h=>Number(h.setIndex)===Number(setIndex)) || null;
}
function trendMetric(current,previous){
  current=Number(current)||0; previous=Number(previous)||0;
  if(!previous && !current) return {cls:'same',txt:'—',pct:0,width:0,color:'var(--accent)'};
  if(!previous) return {cls:'up',txt:'nové',pct:100,width:75,color:'var(--accent)'};
  const pct=((current-previous)/previous)*100;
  const cls=pct>0.01?'up':pct<-0.01?'down':'same';
  const width=Math.max(8,Math.min(100,75+pct*.8));
  const color=cls==='up'?'var(--good)':cls==='down'?'var(--danger)':'var(--warn)';
  return {cls,txt:(pct>0?'+':'')+pct.toFixed(1)+'%',pct,width,color};
}
function lastLogForDay(dayKey){return [...state.logs].filter(l=>l.dayKey===dayKey).sort((a,b)=>new Date(b.date)-new Date(a.date))[0]||null}
function bestTotalVolume(){return state.logs.length ? Math.max(...state.logs.map(l=>Number(l.totalVolume)||0)) : 0}
function ensurePresetFromLast(dayKey){
  const preset=state.presets[dayKey];
  if(preset.items.length) return;
  const last=lastLogForDay(dayKey);
  if(last?.exercises?.length){
    preset.items = last.exercises.map(e=>({exerciseId:e.exerciseId,setCount:Math.max(1,(e.sets||[]).length||1)})).filter(i=>findExercise(i.exerciseId));
    saveState();
  }
}
function sessionElapsed(){return state.activeSession ? Math.floor((Date.now()-new Date(state.activeSession.startedAt).getTime())/1000) : 0}
function sessionTotals(session=state.activeSession){
  let total=0, external=0, bw=0, sets=0;
  if(!session) return {total,external,bw,sets};
  session.exercises.forEach(se=>{
    const ex=findExercise(se.exerciseId);
    (se.sets||[]).forEach(s=>{
      const reps=Number(s.reps)||0;
      const load=effectiveLoadForSet(ex,s,session.bodyWeight);
      if(reps || Number(s.weight)||0) sets++;
      const vol=load*reps;
      total+=vol;
      if(ex?.valueMode==='bw') bw+=vol; else external+=vol;
    });
  });
  return {total,external,bw,sets};
}

function movePlanExercise(exId,dir){

  const t=dir==='up'?i-1:i+1;if(t<0||t>=items.length)return; [items[i],items[t]]=[items[t],items[i]];saveState();render();
}
function changePlanSets(exId,delta){const item=state.presets[selectedDay].items.find(i=>i.exerciseId===exId);if(!item)return;item.setCount=Math.max(1,(Number(item.setCount)||1)+delta);saveState();render()}
function removeFromPlan(exId){state.presets[selectedDay].items=state.presets[selectedDay].items.filter(i=>i.exerciseId!==exId);saveState();render()}
function startWorkout(){
  const items=state.presets[selectedDay].items.filter(i=>findExercise(i.exerciseId));
  if(!items.length)return toast('Nejdřív si do dne přidej aspoň jeden cvik.','warn');

function renderSessionSet(ex,set,i){
  const setNo=i+1; const isBw=ex.valueMode==='bw'; const prev=getPreviousSet(ex,setNo);
  const bodyW=state.activeSession?.bodyWeight || state.bodyWeight;
  const currentLoad=effectiveLoadForSet(ex,set,bodyW);
  const prevLoad=prev?effectiveLoadForSet(ex,prev,prev.bodyWeight || bodyW):0;
  const trLoad=trendMetric(currentLoad,prevLoad);
  const trReps=trendMetric(Number(set.reps)||0, prev?Number(prev.reps)||0:0);
  const trVol=trendMetric((Number(set.reps)||0)*currentLoad, prev?setVolume(ex,prev,prev.bodyWeight || bodyW):0);
  return `<div class="set-card" data-set-index="${i}">
    <div class="set-title"><strong>Série ${setNo}</strong><span class="pill">minule: ${prev?formatPerf(ex,prev):'—'}</span></div>
    <div class="set-inputs ${isBw?'bw':''}">
      ${isBw?`<div><div class="input-label">Váha</div><div class="bw-box">BW ${bodyW?escapeHtml(bodyW)+' kg':''}</div></div>`:`<div><div class="input-label">Váha kg</div>${numControl('weight',set.weight,'0.5','kg')}</div>`}
      <div><div class="input-label">Opakování</div>${numControl('reps',set.reps,'1','reps')}</div>
      <div class="rpe-field"><div class="input-label">RPE</div>${numControl('rpe',set.rpe,'0.5','RPE')}</div>
    </div>
    <div class="trend-stack">
      ${isBw?'':trendLine('Váha',trLoad)}
      ${trendLine('Reps',trReps)}
      ${trendLine('Objem',trVol)}
    </div>
  </div>`;
}
function numControl(field,value,step,placeholder){return `<div class="num-control" data-field="${field}"><button class="step ghost" data-step="-${step}">−</button><input type="number" step="${step}" placeholder="${placeholder}" value="${escapeHtml(value)}"><button class="step ghost" data-step="${step}">+</button></div>`}
function trendLine(name,tr){return `<div class="trend-line"><div class="name">${name}</div><div class="bar-track"><div class="bar" style="width:${tr.width}%;background:${tr.color}"></div></div><div class="delta ${tr.cls}">${tr.txt}</div></div>`}
function renderSessionNav(idx,total){

  return `<div class="session-nav"><div class="session-nav-inner ${idx===0 && total===1?'single':''}">
    ${idx>0?`<button id="prevExerciseBtn" class="big-nav ghost">← Zpět</button>`:''}

function bindSession(){
  timerInterval=setInterval(()=>{const el=document.getElementById('timer');if(el)el.textContent=formatDuration(sessionElapsed())},1000);
  document.getElementById('abortSessionBtn')?.addEventListener('click',()=>{if(confirm('Zahodit aktivní trénink bez uložení?')){state.activeSession=null;saveState();view='setup';render()}});
  document.getElementById('prevExerciseBtn')?.addEventListener('click',()=>{state.activeSession.currentIndex=Math.max(0,state.activeSession.currentIndex-1);saveState();render()});
  document.getElementById('nextExerciseBtn')?.addEventListener('click',()=>{state.activeSession.currentIndex=Math.min(state.activeSession.exercises.length-1,state.activeSession.currentIndex+1);saveState();render()});
  document.getElementById('finishWorkoutBtn')?.addEventListener('click',finishWorkout);
  document.getElementById('addSessionSet')?.addEventListener('click',()=>{const se=currentSessionExercise();se.sets.push({weight:'',reps:'',rpe:''});se.setCount=se.sets.length;saveState();render()});
  document.getElementById('removeSessionSet')?.addEventListener('click',()=>{const se=currentSessionExercise();if(se.sets.length>1){se.sets.pop();se.setCount=se.sets.length;saveState();render()}});
  document.querySelectorAll('.set-card').forEach(card=>{
    const setIndex=Number(card.dataset.setIndex);
    card.querySelectorAll('.num-control').forEach(ctrl=>{
      const field=ctrl.dataset.field; const input=ctrl.querySelector('input');
      input.addEventListener('input',()=>{updateSessionSet(setIndex,field,input.value,false)});
      ctrl.querySelectorAll('.step').forEach(btn=>btn.addEventListener('click',()=>{
        const curr=Number(input.value||0); let next=curr+Number(btn.dataset.step);
        if(field==='rpe') next=Math.max(0,Math.min(10,next)); else next=Math.max(0,next);
        input.value=String(Number(next.toFixed(1))); updateSessionSet(setIndex,field,input.value,true);
      }));
    });
  });
}
function currentSessionExercise(){return state.activeSession.exercises[state.activeSession.currentIndex]}
function updateSessionSet(setIndex,field,value,rerender){
  const se=currentSessionExercise(); if(!se?.sets?.[setIndex])return;
  se.sets[setIndex][field]=value; saveState();
  const totals=sessionTotals();
  const v=document.getElementById('sessionVolume'), sets=document.getElementById('sessionSets');
  if(v)v.textContent=formatKg(totals.total); if(sets)sets.textContent=totals.sets;
  if(rerender)render();
}
function finishWorkout(){
  const s=state.activeSession;if(!s)return;
  const missing=[];
  s.exercises.forEach((se,ei)=>{const ex=findExercise(se.exerciseId);se.sets.forEach((set,si)=>{
    const hasAny=String(set.weight||'').trim()!=='' || String(set.reps||'').trim()!=='' || String(set.rpe||'').trim()!=='';
    if(!hasAny) return;
    if(!Number(set.reps)) missing.push(`${ex?.name||'Cvik'} série ${si+1}: reps`);
    if(ex?.valueMode!=='bw' && (String(set.weight||'').trim()==='' || Number.isNaN(Number(set.weight)))) missing.push(`${ex?.name||'Cvik'} série ${si+1}: váha`);
  })});
  if(missing.length){return toast('Doplň chybějící údaje: '+missing.slice(0,3).join(', ')+(missing.length>3?'...':''),'warn')}
  const rows=[]; let exerciseCount=0;
  s.exercises.forEach((se,ei)=>{const ex=findExercise(se.exerciseId); if(!ex)return; let keptSets=[];
    se.sets.forEach((set,si)=>{
      const reps=Number(set.reps)||0; const hasAny=String(set.weight||'').trim()!=='' || reps || String(set.rpe||'').trim()!=='';
      if(!hasAny)return;
      const load=effectiveLoadForSet(ex,set,s.bodyWeight); const volume=load*reps;
      const clean={setIndex:si+1,weight:ex.valueMode==='bw'?null:Number(set.weight),bodyWeight:ex.valueMode==='bw'?(Number(s.bodyWeight)||0):null,load,reps,rpe:set.rpe===''?null:Number(set.rpe),volume};
      keptSets.push(clean);
      rows.push({ex,se,clean});
    });
    if(keptSets.length) exerciseCount++;
  });
  if(!rows.length)return toast('Není co ukládat. Vyplň aspoň jednu sérii.','warn');
  const endedAt=new Date().toISOString(); const durationSec=Math.floor((new Date(endedAt)-new Date(s.startedAt))/1000);
  const totalVolume=rows.reduce((sum,r)=>sum+r.clean.volume,0);
  const externalVolume=rows.reduce((sum,r)=>sum+(findExercise(r.se.exerciseId)?.valueMode==='bw'?0:r.clean.volume),0);
  const bwVolume=totalVolume-externalVolume;
  const log={id:s.id,date:endedAt,dayKey:s.dayKey,startedAt:s.startedAt,endedAt,durationSec,bodyWeight:s.bodyWeight,totalVolume,externalVolume,bwVolume,setsCount:rows.length,exerciseCount,exercises:[]};
  s.exercises.forEach((se,ei)=>{const ex=findExercise(se.exerciseId);if(!ex)return;const sets=[];rows.filter(r=>r.se===se).forEach(r=>sets.push(r.clean));if(sets.length)log.exercises.push({exerciseId:ex.id,name:ex.name,part:ex.part,valueMode:ex.valueMode,order:ei+1,sets});});
  rows.forEach(r=>{const ex=findExercise(r.se.exerciseId);ex.history.push({id:uid(),date:endedAt,dayKey:s.dayKey,setIndex:r.clean.setIndex,weight:r.clean.weight,reps:r.clean.reps,rpe:r.clean.rpe,bodyWeight:r.clean.bodyWeight,load:r.clean.load,volume:r.clean.volume,sessionId:s.id})});
  state.logs.push(log);
  state.presets[s.dayKey].items=s.exercises.map(se=>({exerciseId:se.exerciseId,setCount:Math.max(1,se.sets.length)}));
  state.activeSession=null; saveState(); view='logs'; toast(`Trénink uložený. Celkem ${formatKg(totalVolume)}.`, 'success'); render();
}

function renderLogs(){
  const best=bestTotalVolume();
  const logs=[...state.logs].sort((a,b)=>new Date(b.date)-new Date(a.date));
  return `<section class="card"><div class="card-head"><h2>Log všech tréninků</h2><div class="row"><span class="pill good">PR objem: ${best?formatKg(best):'—'}</span><button id="exportAllCsv" class="ghost">Export všech CSV</button></div></div><div class="card-body"><div class="log-list">${logs.map(l=>renderLogItem(l,best)).join('')||'<div class="tiny">Zatím žádný uložený trénink.</div>'}</div></div></section>`;
}
function renderLogItem(log,best){
  const pct=best?Math.round((log.totalVolume/best)*100):0;
  const delta=best?log.totalVolume-best:0;
  const isPr=best && Number(log.totalVolume)===Number(best);
  return `<div class="log-item">
    <div class="log-headline"><div><div class="log-title">${DAY_NAMES[log.dayKey]||log.dayKey} · ${dateTime(log.date)}</div><div class="log-meta">${log.exerciseCount} cviků · ${log.setsCount} sérií · ${formatDuration(log.durationSec)}</div></div><button data-export-log="${log.id}" class="primary">Export CSV</button></div>
    <div class="log-metrics">
      <div class="log-metric"><div class="t">Celkem</div><div class="v">${formatKg(log.totalVolume)}</div></div>
      <div class="log-metric"><div class="t">Proti PR</div><div class="v">${isPr?'🏆 PR':(delta>=0?'+':'')+formatKg(delta)}</div></div>
      <div class="log-metric"><div class="t">% z PR</div><div class="v">${pct}%</div></div>
      <div class="log-metric"><div class="t">BW</div><div class="v">${log.bodyWeight?escapeHtml(log.bodyWeight)+' kg':'—'}</div></div>
    </div>
    <details><summary>Detail tréninku</summary><div class="table-wrap"><table><thead><tr><th>#</th><th>Cvik</th><th>Série</th><th>Váha</th><th>Reps</th><th>RPE</th><th>Objem</th></tr></thead><tbody>${log.exercises.map(e=>(e.sets||[]).map(s=>`<tr><td>${e.order}</td><td>${escapeHtml(e.name)}</td><td>${s.setIndex}</td><td>${e.valueMode==='bw'?'BW '+(s.bodyWeight||log.bodyWeight||''):(s.weight??'')}</td><td>${s.reps}</td><td>${s.rpe??''}</td><td>${formatKg(s.volume)}</td></tr>`).join('')).join('')}</tbody></table></div></details>
  </div>`;
}
function bindLogs(){
  document.querySelectorAll('[data-export-log]').forEach(btn=>btn.addEventListener('click',()=>exportWorkoutCsv(state.logs.find(l=>l.id===btn.dataset.exportLog))));
  document.getElementById('exportAllCsv')?.addEventListener('click',()=>exportAllCsv());
}
function csvEscape(v){v=String(v??'');return /[";,\n]/.test(v)?'"'+v.replaceAll('"','""')+'"':v}
function workoutRows(log){
  const rows=[];
  log.exercises.forEach(e=>(e.sets||[]).forEach(s=>rows.push({
    session_id:log.id,date:log.date,day:DAY_NAMES[log.dayKey]||log.dayKey,duration_sec:log.durationSec,total_workout_volume:Math.round(log.totalVolume),body_weight:log.bodyWeight,
    exercise_order:e.order,exercise:e.name,part:e.part,value_mode:e.valueMode,set_index:s.setIndex,weight:s.weight??'',bodyweight_for_set:s.bodyWeight??'',effective_load:s.load??'',reps:s.reps,rpe:s.rpe??'',set_volume:Math.round(s.volume||0)
  })));
  return rows;
}
function downloadCsv(filename,rows){
  if(!rows.length)return toast('Není co exportovat.','warn');
  const headers=Object.keys(rows[0]);
  const csv='\ufeff'+headers.join(';')+'\n'+rows.map(r=>headers.map(h=>csvEscape(r[h])).join(';')).join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=filename; a.click(); URL.revokeObjectURL(a.href);
}
function exportWorkoutCsv(log){if(!log)return;downloadCsv(`trenink_${log.dayKey}_${log.date.slice(0,10)}.csv`,workoutRows(log));}
function exportAllCsv(){downloadCsv('trenink_log_vsechny_treninky.csv',[...state.logs].sort((a,b)=>new Date(a.date)-new Date(b.date)).flatMap(workoutRows));}

function renderDb(){
  const grouped=groupedExercises();
  return `<section class="card"><div class="card-head"><h2>Databáze cviků</h2><span class="pill">${state.exercises.length} cviků</span></div><div class="card-body">
    <div class="grid3"><div><label>Název cviku</label><input id="newExName" placeholder="Např. Incline DB press"></div><div><label>Partie</label><input id="newExPart" placeholder="Např. Hrudník"></div><div><label>Typ odporu</label><select id="newExValue"><option value="weight">kg</option><option value="bw">BW</option></select></div></div>
    <div class="row" style="margin-top:10px"><button id="addDbExercise" class="primary">Přidat cvik</button></div><div class="hr"></div>
    <div class="grid"><div><label>Filtr partie</label><select id="dbPart">${renderPartOptions(state.ui.dbPartFilter)}</select></div><div><label>Hledat</label><input id="dbSearch" value="${escapeHtml(state.ui.dbSearch||'')}" placeholder="hledat cvik..."></div></div>
    <div class="db-list" style="margin-top:12px">${Object.entries(grouped).map(([part,list])=>`<div class="card"><div class="card-head"><h3>${escapeHtml(part)}</h3><span class="pill">${list.length}</span></div><div class="card-body"><div class="db-list">${list.map(renderDbItem).join('')}</div></div></div>`).join('') || '<div class="tiny">Nic nenalezeno.</div>'}</div>
  </div></section>`;
}
function groupedExercises(){
  const q=(state.ui.dbSearch||'').toLowerCase(); const pf=state.ui.dbPartFilter||'all'; const groups={};
  state.exercises.filter(ex=>(pf==='all'||ex.part===pf) && (`${ex.name} ${ex.part}`).toLowerCase().includes(q)).sort((a,b)=>(a.part||'').localeCompare(b.part||'','cs') || a.name.localeCompare(b.name,'cs')).forEach(ex=>{const p=ex.part||'Bez partie';(groups[p]||(groups[p]=[])).push(ex)});
  return groups;
}
function renderDbItem(ex){const st=exerciseStats(ex);return `<div class="db-item"><div class="db-top"><div><div class="db-title">${escapeHtml(ex.name)}</div><div class="tiny">${escapeHtml(ex.part||'Bez partie')} · ${ex.valueMode==='bw'?'BW':'kg'} · historie: ${(ex.history||[]).length} setů</div><div class="tiny">PR: ${ex.valueMode==='bw'?'':formatPerf(ex,st.bestWeight,'weight')+' · '} ${formatPerf(ex,st.bestReps,'reps')} · ${formatPerf(ex,st.bestVolume,'volume')}</div></div><button data-del-db="${ex.id}" class="danger">Smazat</button></div><details><summary>Historie</summary><div class="table-wrap"><table><thead><tr><th>Datum</th><th>Den</th><th>Série</th><th>Váha</th><th>Reps</th><th>RPE</th><th>Objem</th></tr></thead><tbody>${[...(ex.history||[])].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(h=>`<tr><td>${dateOnly(h.date)}</td><td>${DAY_NAMES[h.dayKey]||h.dayKey}</td><td>${h.setIndex}</td><td>${ex.valueMode==='bw'?'BW '+(h.bodyWeight||''):(h.weight??'')}</td><td>${h.reps}</td><td>${h.rpe??''}</td><td>${formatKg(h.volume||setVolume(ex,h,h.bodyWeight))}</td></tr>`).join('')||'<tr><td colspan="7">Bez historie</td></tr>'}</tbody></table></div></details></div>`}
function bindDb(){
  document.getElementById('dbPart')?.addEventListener('change',e=>{state.ui.dbPartFilter=e.target.value;saveState();render()});
  document.getElementById('dbSearch')?.addEventListener('input',e=>{state.ui.dbSearch=e.target.value;saveState();render()});
  document.getElementById('addDbExercise')?.addEventListener('click',()=>{
    const name=document.getElementById('newExName').value.trim(), part=document.getElementById('newExPart').value.trim(), value=document.getElementById('newExValue').value;
    if(!name)return toast('Zadej název cviku.','warn');
    if(state.exercises.some(e=>e.name.toLowerCase()===name.toLowerCase()))return toast('Tenhle cvik už existuje.','warn');
    state.exercises.push({id:uid(),name,part,trackMode:value==='bw'?'reps':'both',valueMode:value,history:[]});saveState();toast('Cvik přidaný.','success');render();
  });
  document.querySelectorAll('[data-del-db]').forEach(btn=>btn.addEventListener('click',()=>{
    const ex=findExercise(btn.dataset.delDb); if(!ex)return;
    if(!confirm(`Smazat cvik „${ex.name}“ včetně historie?`))return;
    state.exercises=state.exercises.filter(e=>e.id!==ex.id); for(const d of DAYS){state.presets[d.key].items=state.presets[d.key].items.filter(i=>i.exerciseId!==ex.id)}; saveState(); render();
  }));
}

function bindCommon(){
  document.getElementById('menuBtn').onclick=toggleDrawer;
  document.getElementById('closeDrawer').onclick=toggleDrawer;
  document.getElementById('drawerOverlay').onclick=toggleDrawer;
  document.querySelectorAll('[data-nav]').forEach(btn=>btn.onclick=()=>{view=btn.dataset.nav;toggleDrawer(false);render()});
  document.getElementById('exportJsonBtn').onclick=exportJson;
  document.getElementById('importJsonBtn').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=importJson;
  document.getElementById('resetBtn').onclick=()=>{if(confirm('Opravdu smazat všechna lokální data aplikace?')){localStorage.removeItem(STORAGE_KEY);state=defaultState();view='setup';toggleDrawer(false);saveState();render()}};
  document.getElementById('seedDbBtn').onclick=seedBaseDb;
}
function toggleDrawer(force){
  const d=document.getElementById('drawer'), o=document.getElementById('drawerOverlay');
  const open=typeof force==='boolean'?force:!d.classList.contains('open');
  d.classList.toggle('open',open); o.classList.toggle('open',open);
}
function exportJson(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='trenink-log-v7-zaloha.json'; a.click(); URL.revokeObjectURL(a.href); toggleDrawer(false); toast('JSON záloha stažená.','success');
}
async function importJson(e){
  const file=e.target.files[0]; if(!file)return;
  try{state=migrateState(JSON.parse(await file.text())); saveState(); view='setup'; toggleDrawer(false); toast('Import hotový.','success'); render();}
  catch(err){console.error(err);toast('Import se nepovedl.','danger')} finally{e.target.value=''}
}
function seedBaseDb(){
  if(state.exercises.length && !confirm('Databáze už má cviky. Přidat jen chybějící základní cviky?'))return;
  const base={
    'Hrudník':['Bench press','Incline bench press','DB bench press','Incline DB press','Multipress bench press','Multipress incline press','Cable fly','Low to high cable fly','Kliky|bw','Dipy na prsa|bw'],
    'Záda':['Shyby nadhmatem|bw','Shyby podhmatem|bw','Přítahy velké činky v předklonu','Pendlay row','Jednoruční přítah jednoručky','Seated cable row','Lat pulldown','Straight arm pulldown','Rumunský mrtvý tah','Mrtvý tah'],
    'Ramena':['Military press s osou','DB shoulder press','Multipress shoulder press','Upažování s jednoručkami','Upažování na kladce','Rear delt fly','Reverse fly na kladce','Face pull'],
    'Biceps':['Bicepsový zdvih s osou','DB alternating curl','Hammer curl','Incline DB curl','Cable curl jednoruč','Bayesian cable curl'],
    'Triceps':['Triceps pushdown','Overhead triceps extension','Francouzský tlak','Bench dip|bw','Kliky na úzko|bw','Skull crushers'],
    'Nohy':['Dřep s osou','Front squat','Multipress squat','Bulgarian split squat','Goblet squat','Výpady','Step-up','Rumunský mrtvý tah','Zakopávání na kladce vestoje','Hip thrust s osou','Výpony ve stoje s jednoručkami'],
    'Core':['Ab wheel rollout|bw','Plank|bw','Side plank|bw','Hanging knee raise|bw','Hanging leg raise|bw','Cable crunch','Woodchopper','Russian twist s kettlebellem']
  };
  let added=0;
  Object.entries(base).forEach(([part,names])=>names.forEach(raw=>{const [name,mode]=raw.split('|'); if(state.exercises.some(e=>e.name.toLowerCase()===name.toLowerCase()))return; state.exercises.push({id:uid(),name,part,trackMode:mode==='bw'?'reps':'both',valueMode:mode==='bw'?'bw':'weight',history:[]}); added++;}));
  saveState();toggleDrawer(false);toast(`Přidáno ${added} cviků.`, added?'success':'warn');render();
}

render();
</script>
</body>
</html>
